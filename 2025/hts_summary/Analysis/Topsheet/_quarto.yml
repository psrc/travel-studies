project:
  type: book
  output-dir: "topsheet-notebook"
  
book:
  title: "2025 HTS Summary - Topsheet"
  repo-url: https://github.com/psrc/travel-studies/tree/master/2025
  search: false
  sidebar:
    logo: ../../PSRClogo2016path.png

  chapters:
    - index.qmd # this is a required file for Quarto Book
    - topsheet_summary.qmd

format:
  html:
    mainfont: Poppins
    theme: [cosmo, custom.scss]  # custom formatting
    echo: false
    code-tools: true
    df-print: kable
    fig-asp: .7
    fig-width: 4
    
execute:
  freeze: auto  # re-render only when source changes


toc: true
warnings: false